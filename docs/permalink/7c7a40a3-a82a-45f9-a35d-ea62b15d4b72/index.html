      <h1>Grow Strong My Comrade by Will Durant</h1>
    </figure>
    <header>
      <time datetime="2020-03-21">3/21/2020</time>
    </header>
    <section>
<p>Grow strong, my comrade… so that you may stand<br>Unshaken when I fall, so that I may know<br>The shattered fragments of my song will come<br>At last to a finer melody in you;<br>So that I may tell my heart that you begin<br>Where passing I leave off and fathom more.</p>

    </section>
