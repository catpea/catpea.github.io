    <section class="permalink-content-body">
<p class="permalink-paragraph">Captain&#39;s Log: Day Thirteen of Quarantine;</p>
<p class="permalink-paragraph">Still staring at my screen,</p>
<p class="permalink-paragraph">hanging on for dear life to my spleen.</p>
<p class="permalink-paragraph">As I drink another coffee bean,</p>
<p class="permalink-paragraph">trying, trying not to create a scene.</p>
<p class="permalink-paragraph">Dancing dressed red outside my window,</p>
<p class="permalink-paragraph">during quarantine.</p>
